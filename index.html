<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ferdi Tech Studio — Graphic Designer</title>
  <style>
    /* ===== FONTS ===== */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --bg: #0a0a0f;
      --bg-card: #12121a;
      --bg-card2: #1a1a28;
      --accent: #f4c542;
      --accent2: #e8853e;
      --text: #f0eee8;
      --muted: #7a788f;
      --border: rgba(244,197,66,0.15);
      --glow: rgba(244,197,66,0.18);
      --radius: 14px;
      --ff-head: 'Playfair Display', serif;
      --ff-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ff-body);
      line-height: 1.7;
      overflow-x: hidden;
    }

    img { display: block; width: 100%; height: 100%; object-fit: cover; }
    a { color: inherit; text-decoration: none; }

    nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between;
      padding: 1rem 6vw;
      background: rgba(10,10,15,0.85);
    }

    .nav-logo {
      font-family: var(--ff-head);
      font-weight: 900;
      color: var(--accent);
    }

    .hero {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      padding: 0 6vw;
    }

    .hero h1 {
      font-size: clamp(3rem, 8vw, 7rem);
      font-family: var(--ff-head);
    }

    section { padding: 100px 6vw; }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5vw;
    }

    .works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.6rem;
    }
  </style>
</head>

<body>

<nav>
  <a href="#hero" class="nav-logo">Ferdi Tech Studio</a>
</nav>

<section class="hero" id="hero">
  <div>
    <h1>Ferdi Tech Studio</h1>
    <p>I create professional designs</p>
  </div>
</section>

<section id="about">
  <div class="about-grid">
    <div>
      <p>About Me Content</p>
    </div>
    <div>
      <p>More Details</p>
    </div>
  </div>
</section><div class="project-card">Project 1</div>
    <div class="project-card">Project 2</div>
    <div class="project-card">Project 3</div>
    <div class="project-card">Project 4</div>
  </div>
</section>

<section id="contact">
  <h2>Contact Me</h2>

  <p>Phone: +234 8027139632</p>
  <p>Email: ferditechstudio@gmail.com</p>

  <button onclick="alert('Message Sent')">
    Send Message
  </button>
</section>

<footer>
  <p>© 2025 Ferdi Tech Studio</p>
</footer>

</body>
</html>
