<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferdi Tech Studio — Graphic Designer</title>
  <style>
    /* ─── RESET & ROOT ────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0a0a0f;
      --bg2:       #111118;
      --bg3:       #16161f;
      --surface:   #1c1c28;
      --border:    #2a2a3a;
      --gold:      #e8b86d;
      --gold2:     #f5d08a;
      --gold-glow: rgba(232,184,109,0.18);
      --text:      #e8e8f0;
      --muted:     #888899;
      --white:     #ffffff;
      --radius:    12px;
      --radius-lg: 20px;
      --transition: 0.35s cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.5;
    }

    /* ─── TYPOGRAPHY ──────────────────────────────────────── */
    h1, h2, h3 {
      font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .label {
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* ─── NAV ─────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.2rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10,10,15,0.75);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Palatino Linotype', Palatino, serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      letter-spacing: 0.04em;
    }

    .nav-logo span { color: var(--gold); }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color var(--transition);
    }

    .nav-links a:hover { color: var(--gold); }

    /* Hamburger */
    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }

    .nav-toggle span {
      width: 24px; height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: var(--transition);
    }

    /* ─── HERO ────────────────────────────────────────────── */
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8rem 5% 5rem;
      position: relative;
      overflow: hidden;
    }

    /* Decorative bg rings */
    #hero::before, #hero::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--border);
      pointer-events: none;
    }
    #hero::before {
      width: 700px; height: 700px;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      opacity: 0.4;
    }
    #hero::after {
      width: 1100px; height: 1100px;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      opacity: 0.2;
    }

    .hero-glow {
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,184,109,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      text-align: center;
      max-width: 800px;
      animation: fadeUp 1s ease both;
    }

    .hero-inner .label { margin-bottom: 1.5rem; display: block; }

    .hero-name {
      font-size: clamp(2.8rem, 8vw, 6.5rem);
      line-height: 1.05;
      color: var(--white);
      margin-bottom: 0.6rem;
    }

    .hero-name .accent { color: var(--gold); }

    .hero-title {
      font-family: 'Courier New', monospace;
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.8rem;
    }

    .hero-tagline {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: #b0b0c0;
      max-width: 520px;
      margin: 0 auto 2.5rem;
      font-style: italic;
    }

    .hero-divider {
      width: 60px; height: 1px;
      background: var(--gold);
      margin: 0 auto 2.5rem;
      opacity: 0.6;
    }

    .btn-primary {
      display: inline-block;
      padding: 0.85rem 2.4rem;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform var(--transition);
      z-index: -1;
    }

    .btn-primary:hover {
      color: var(--bg);
    }
    .btn-primary:hover::before { transform: scaleX(1); }

    /* ─── SECTION SHARED ──────────────────────────────────── */
    section {
      padding: 6rem 5%;
    }

    .section-head {
      text-align: center;
      margin-bottom: 4rem;
    }

    .section-head .label { margin-bottom: 0.8rem; display: block; }

    .section-head h2 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      color: var(--white);
      margin-bottom: 1rem;
    }

    .section-head p {
      color: var(--muted);
      max-width: 520px;
      margin: 0 auto;
    }

    .line-accent {
      width: 48px; height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
      margin: 1.2rem auto 0;
    }

    /* ─── ABOUT ───────────────────────────────────────────── */
    #about { background: var(--bg2); }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1.6fr;
      gap: 4rem;
      align-items: center;
      max-width: 1100px;
      margin: 0 auto;
    }

    .about-visual {
      position: relative;
    }

    .about-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      max-width: 340px;
      margin: 0 auto;
    }

    .about-img-frame {
      width: 100%;
      height: 100%;
      border-radius: var(--radius-lg);
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      overflow: hidden;
    }

    .about-img-frame img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Decorative gold corner */
    .about-img-wrap::before {
      content: '';
      position: absolute;
      top: -10px; right: -10px;
      width: 70%; height: 70%;
      border-top: 2px solid var(--gold);
      border-right: 2px solid var(--gold);
      border-radius: 0 var(--radius-lg) 0 0;
      opacity: 0.4;
    }

    .about-img-wrap::after {
      content: '';
      position: absolute;
      bottom: -10px; left: -10px;
      width: 50%; height: 50%;
      border-bottom: 2px solid var(--gold);
      border-left: 2px solid var(--gold);
      border-radius: 0 0 0 var(--radius-lg);
      opacity: 0.4;
    }

    .stat-row {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 2rem;
      font-family: 'Palatino Linotype', Palatino, serif;
      color: var(--gold);
      line-height: 1;
    }

    .stat-label {
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    .about-text h2 {
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      color: var(--white);
      margin-bottom: 1.2rem;
    }

    .about-text p {
      color: #a0a0b5;
      margin-bottom: 1rem;
      font-size: 0.98rem;
    }

    .skills-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-top: 1.5rem;
    }

    .skill-tag {
      padding: 0.4rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--gold2);
    }

    /* ─── WORKS ───────────────────────────────────────────── */
    #works { background: var(--bg); }

    .works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ══ PROJECT CARD — copy this block to add more projects ══ */
    .project-card {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      aspect-ratio: 4/3;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    }

    .project-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px var(--gold);
      border-color: var(--gold);
    }

    .project-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform var(--transition);
    }

    .project-card:hover img { transform: scale(1.06); }

    /* Placeholder when no image */
    .project-card .img-placeholder {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      color: var(--border);
      gap: 0.5rem;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
    }

    .project-card .img-placeholder svg {
      width: 36px; height: 36px;
      opacity: 0.3;
    }

    .project-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.2) 50%, transparent 100%);
      opacity: 0;
      transition: opacity var(--transition);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.5rem;
    }

    .project-card:hover .project-overlay { opacity: 1; }

    .project-overlay h3 {
      font-size: 1.05rem;
      color: var(--white);
      margin-bottom: 0.25rem;
    }

    .project-overlay .tag {
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-transform: uppercase;
    }
    /* ══ END PROJECT CARD ══ */

    /* ─── CONTACT ─────────────────────────────────────────── */
    #contact { background: var(--bg2); }

    .contact-wrap {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 4rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    .contact-info h3 {
      font-size: 1.5rem;
      color: var(--white);
      margin-bottom: 1rem;
    }

    .contact-info p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1.4rem;
    }

    .contact-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1rem;
    }

    .contact-item a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color var(--transition);
    }
    .contact-item a:hover { color: var(--gold); }

    .contact-item .ci-label {
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .btn-whatsapp {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      padding: 0.7rem 1.6rem;
      background: #075e54;
      border: 1px solid #128C7E;
      color: #fff;
      border-radius: var(--radius);
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: var(--transition);
    }

    .btn-whatsapp:hover {
      background: #128C7E;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(7,94,84,0.4);
    }

    /* Form */
    .contact-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.8rem 1rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Georgia', serif;
      font-size: 0.9rem;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
      resize: none;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    .form-group textarea { min-height: 120px; }

    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      background: var(--gold);
      border: none;
      border-radius: var(--radius);
      color: var(--bg);
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      font-weight: 700;
      transition: var(--transition);
    }

    .btn-submit:hover {
      background: var(--gold2);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--gold-glow);
    }

    /* ─── FOOTER ──────────────────────────────────────────── */
    footer {
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 3rem 5%;
      text-align: center;
    }

    .footer-logo {
      font-family: 'Palatino Linotype', Palatino, serif;
      font-size: 1.4rem;
      color: var(--white);
      margin-bottom: 0.5rem;
    }

    .footer-logo span { color: var(--gold); }

    .footer-tagline {
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .social-link {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-decoration: none;
      font-size: 1.1rem;
      transition: var(--transition);
    }

    .social-link:hover {
      border-color: var(--gold);
      color: var(--gold);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px var(--gold-glow);
    }

    .footer-copy {
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      opacity: 0.6;
    }

    /* ─── ANIMATIONS ──────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-up {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── MOBILE ──────────────────────────────────────────── */
    @media (max-width: 768px) {
      nav { padding: 1rem 5%; }

      .nav-links {
        display: none;
        flex-direction: column;
        gap: 1rem;
        position: absolute;
        top: 100%;
        left: 0; right: 0;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        padding: 1.5rem 5%;
      }

      .nav-links.open { display: flex; }

      .nav-toggle { display: flex; }

      section { padding: 4rem 5%; }

      .about-grid {
        grid-template-columns: 1fr;
        gap: 2.5rem;
      }

      .about-img-wrap { max-width: 260px; }

      .stat-row { gap: 1.2rem; }

      .contact-wrap {
        grid-template-columns: 1fr;
        gap: 2.5rem;
      }

      .works-grid {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      }
    }
  </style>
</head>
<body>

  <!-- ─── NAV ──────────────────────────────────────────────── -->
  <nav>
    <a href="#hero" class="nav-logo">Ferdi <span>Studio</span></a>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="#about">About</a></li>
      <li><a href="#works">Works</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- ─── HERO ─────────────────────────────────────────────── -->
  <section id="hero">
    <div class="hero-glow"></div>
    <div class="hero-inner">
      <span class="label">Portfolio — 2025</span>
      <h1 class="hero-name">Ferdi <span class="accent">Tech</span><br>Studio</h1>
      <p class="hero-title">Graphic Designer</p>
      <div class="hero-divider"></div>
      <p class="hero-tagline">I create professional flyers, branding, and social media designs that make your brand unforgettable.</p>
      <a href="#works" class="btn-primary">View My Work</a>
    </div>
  </section>

  <!-- ─── ABOUT ─────────────────────────────────────────────── -->
  <section id="about">
    <div class="about-grid">
      <div class="about-visual fade-up">
        <div class="about-img-wrap">
          <div class="about-img-frame">
            <!--
              Replace the line below with:
              <img src="your-photo.jpg" alt="Ferdi Tech Studio" />
            -->
            <span style="text-align:center; padding:1rem;">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:48px;height:48px;opacity:0.2;display:block;margin:0 auto 0.5rem">
